<!DOCTYPE html>
<html lang="en">

<head>

    <!-- ===================================================== -->
    <!-- ?? YELLOW SECTION -->
    <!-- Typography & Page Metadata -->
    <!-- ===================================================== -->

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Register | Agri Tracker</title>

    <!-- ===================================================== -->
    <!-- ?? PURPLE SECTION -->
    <!-- External CSS Files -->
    <!-- ===================================================== -->

    <link rel="stylesheet" href="assets/css/register.css">

</head>

<body>

    <!-- ===================================================== -->
    <!-- ?? BLUE SECTION -->
    <!-- Layout & Card Structure -->
    <!-- ===================================================== -->

    <div class="agri-register-card-wrapper">

        <div class="agri-register-card-container">

            <!-- ===================================================== -->
            <!-- ?? YELLOW SECTION -->
            <!-- Logo & Heading -->
            <!-- ===================================================== -->

            <!-- Logo -->
            <div class="agri-register-card-logo">
                <img src="assets/logo/agritracker_Login_emblem.png"
                     alt="Agri Tracker Logo">
            </div>

            <!-- Title -->
            <h1 class="agri-register-card-title">
                Agri Tracker
            </h1>

            <p class="agri-register-card-subtitle">
                Create New Account
            </p>

            <!-- ===================================================== -->
            <!-- ? WHITE SECTION -->
            <!-- Registration Form Inputs -->
            <!-- ===================================================== -->

            <form id="registerForm">

                <!-- Full Name -->
                <div class="form-group">
                    <label>Full Name *</label>

                    <input type="text"
                           id="fullName"
                           placeholder="Enter Full Name"
                           required>
                </div>

                <!-- Email -->
                <div class="form-group">
                    <label>Email ID</label>

                    <input type="email"
                           id="email"
                           placeholder="Enter Email Address">
                </div>

                <!-- Mobile Number -->
                <div class="form-group">
                    <label>Mobile Number *</label>

                    <input type="text"
                           id="mobile"
                           placeholder="Enter Mobile Number"
                           required>
                </div>

                <!-- Password -->
                <div class="form-group">
                    <label>Password *</label>

                    <input type="password"
                           id="password"
                           placeholder="Enter Password"
                           required>
                </div>

                <!-- Confirm Password -->
                <div class="form-group">
                    <label>Confirm Password *</label>

                    <input type="password"
                           id="confirmPassword"
                           placeholder="Confirm Password"
                           required>
                </div>

                <!-- ===================================================== -->
                <!-- ?? GREEN SECTION -->
                <!-- Action Buttons -->
                <!-- ===================================================== -->

                <button type="submit"
                        class="register-btn">
                    Register New Account
                </button>

                <!-- ===================================================== -->
                <!-- ?? RED SECTION -->
                <!-- Navigation & Redirect Links -->
                <!-- ===================================================== -->

                <!--
                    Redirect Target:
                    Login Here ? logincard.html
                -->

                <div class="login-link">
                    Already have an account?

                    <a href="logincard.html">
                        Login Here
                    </a>
                </div>

            </form>

        </div>

    </div>

    <!-- ===================================================== -->
    <!-- ?? PURPLE SECTION -->
    <!-- API & External Services -->
    <!-- ===================================================== -->

    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Supabase Configuration -->
    <script src="assets/js/supabase-config.js"></script>

    <!-- Registration Logic -->
    <script src="assets/js/register.js"></script>

    <!-- ===================================================== -->
    <!-- ?? BROWN SECTION -->
    <!-- Database Structure Documentation -->
    <!-- ===================================================== -->

    <!--
        Database Logic Managed In:
        assets/js/register.js

        Expected Documentation:

        Table Names
        Column Names
        Relationships
        Data Flow
    -->

    <!-- ===================================================== -->
    <!-- ? BLACK SECTION -->
    <!-- Security & Validation Documentation -->
    <!-- ===================================================== -->

    <!--
        Authentication
        Authorization
        Password Validation
        Required Field Validation
        Error Handling
        Session Management
    -->

</body>

</html>
