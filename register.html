<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Register | Agri Tracker</title>

    <meta name="description"
          content="Create a new Agri Tracker account to manage farms, crops, expenses and agricultural activities.">

    <link rel="stylesheet" href="assets/css/register.css">

</head>

<body>

    <main class="agri-register-card-wrapper">

        <section class="agri-register-card-container"
                 aria-labelledby="registerTitle">

            <!-- Logo -->

            <div class="agri-register-card-logo">
                <img src="assets/logo/agritracker_Login_emblem.png"
                     alt="Agri Tracker Logo">
            </div>

            <!-- Heading -->

            <h1 id="registerTitle"
                class="agri-register-card-title">
                Agri Tracker
            </h1>

            <p class="agri-register-card-subtitle">
                Create New Account
            </p>

            <!-- Registration Form -->

            <form id="registerForm"
                  novalidate>

                <!-- Full Name -->

                <div class="form-group">

                    <label for="fullName">
                        Full Name <span aria-hidden="true">*</span>
                    </label>

                    <input type="text"
                           id="fullName"
                           name="fullName"
                           placeholder="Enter Full Name"
                           autocomplete="name"
                           required>

                </div>

                <!-- Email -->

                <div class="form-group">

                    <label for="email">
                        Email ID
                    </label>

                    <input type="email"
                           id="email"
                           name="email"
                           placeholder="Enter Email Address"
                           autocomplete="email">

                </div>

                <!-- Mobile Number -->

                <div class="form-group">

                    <label for="mobile">
                        Mobile Number <span aria-hidden="true">*</span>
                    </label>

                    <input type="tel"
                           id="mobile"
                           name="mobile"
                           placeholder="Enter Mobile Number"
                           autocomplete="tel"
                           inputmode="numeric"
                           required>

                </div>

                <!-- Password -->

                <div class="form-group">

                    <label for="password">
                        Password <span aria-hidden="true">*</span>
                    </label>

                    <input type="password"
                           id="password"
                           name="password"
                           placeholder="Enter Password"
                           autocomplete="new-password"
                           required>

                </div>

                <!-- Confirm Password -->

                <div class="form-group">

                    <label for="confirmPassword">
                        Confirm Password <span aria-hidden="true">*</span>
                    </label>

                    <input type="password"
                           id="confirmPassword"
                           name="confirmPassword"
                           placeholder="Confirm Password"
                           autocomplete="new-password"
                           required>

                </div>

                <!-- Validation / Error Messages -->

                <div id="formMessage"
                     class="form-message"
                     aria-live="polite">
                </div>

                <!-- Register Button -->

                <button type="submit"
                        class="register-btn">

                    Register New Account

                </button>

                <!-- Login Link -->

                <div class="login-link">

                    Already have an account?

                    <a href="logincard.html">
                        Login Here
                    </a>

                </div>

            </form>

        </section>

    </main>

    <!-- Supabase -->

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Config -->

    <script src="assets/js/supabase-config.js"></script>

    <!-- Register Logic -->

    <script src="assets/js/register.js"></script>

</body>

</html>
