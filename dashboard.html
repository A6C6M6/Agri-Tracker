<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agri Tracker | Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; display: flex; height: 100vh; }

        /* Sidebar */
        .sidebar { width: 250px; background: #f4f4f4; padding: 20px; border-right: 1px solid #ddd; }
        .sidebar h2 { margin-bottom: 20px; }
        .sidebar ul { list-style: none; }
        .sidebar ul li { padding: 10px 0; cursor: pointer; }

        /* Main Content */
        .main-content { flex: 1; padding: 20px; display: flex; flex-direction: column; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .dashboard-box { border: 1px solid #ddd; padding: 20px; border-radius: 8px; }

        /* Logout Button */
        .logout-btn { background-color: #ff4d4d; color: white; padding: 8px 15px; border: none; border-radius: 4px; cursor: pointer; }
        .logout-btn:hover { background-color: #e60000; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <h2>Agri Tracker</h2>
        <ul>
            <li>Dashboard</li>
            <li>Overview</li>
        </ul>
    </aside>

    <main class="main-content">
        <div class="header">
            <h1>Dashboard</h1>
            <button class="logout-btn" onclick="window.location.href='logincard.html';">Logout</button>
        </div>

        <section class="dashboard-box">
            <h2>Welcome to Agri Tracker</h2>
            <p>Enterprise Agriculture Management Dashboard</p>
        </section>
    </main>

</body>
</html>
