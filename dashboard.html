<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agri Tracker | Enterprise Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/dashboard.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { primary: '#22C55E', 'primary-dark': '#15803D' } } } }
    </script>
</head>
<body class="bg-slate-50 text-slate-900 transition-colors duration-300">
    <div id="toast-container" class="fixed top-5 right-5 z-50 flex flex-col gap-2"></div>

    <div class="flex h-screen overflow-hidden">
        <aside id="sidebar" class="w-64 bg-white border-r border-slate-200 hidden md:flex flex-col transition-all duration-300">
            <div class="p-6 flex items-center gap-3">
                <i class="fa-solid fa-seedling text-primary text-2xl"></i>
                <span class="font-bold text-xl tracking-tight">Agri Tracker</span>
            </div>
            <nav id="nav-menu" class="flex-1 px-4 space-y-1 mt-4">
                <a href="#" data-route="dashboard" class="nav-item flex items-center gap-3 px-4 py-3 bg-slate-100 rounded-lg font-medium text-primary"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
                <a href="#" data-route="overview" class="nav-item flex items-center gap-3 px-4 py-3 text-slate-600 hover:bg-slate-50 rounded-lg"><i class="fa-solid fa-eye"></i> Overview</a>
                <a href="#" data-route="crops" class="nav-item flex items-center gap-3 px-4 py-3 text-slate-600 hover:bg-slate-50 rounded-lg"><i class="fa-solid fa-wheat-awn"></i> Crops</a>
            </nav>
        </aside>

        <main class="flex-1 flex flex-col overflow-hidden">
            <header class="h-16 bg-white/80 backdrop-blur-md border-b border-slate-200 flex items-center justify-between px-8 sticky top-0 z-10">
                <h1 class="text-lg font-semibold">Dashboard</h1>
                <div class="flex items-center gap-4">
                    <button id="theme-toggle" class="p-2 rounded-lg hover:bg-slate-100"><i class="fa-solid fa-moon"></i></button>
                    <button id="add-crop-btn" class="bg-primary text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-primary-dark transition">Add Crop</button>
                </div>
            </header>
            <div class="flex-1 overflow-y-auto p-8">
                <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
                    <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm"><p class="text-sm text-slate-500">Total Crops</p><h3 class="text-2xl font-bold mt-1">128</h3></div>
                </div>
                <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
                    <canvas id="yieldChart"></canvas>
                </div>
            </div>
        </main>
    </div>
    <script src="assets/js/dashboard.js"></script>
</body>
</html>
