<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
    body{
        font-family:Arial,sans-serif;
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
        background:#f5f5f5;
    }

    .card{
        background:#fff;
        padding:30px;
        border-radius:10px;
        width:350px;
        box-shadow:0 0 10px rgba(0,0,0,.1);
    }

    input{
        width:100%;
        padding:10px;
        margin-top:10px;
        margin-bottom:15px;
    }

    button{
        width:100%;
        padding:10px;
    }
    </style>
</head>
<body>

<div class="card">
    <h2>Forgot Password</h2>

    <input
        type="email"
        id="email"
        placeholder="Enter Email Address"
    >

    <button id="resetBtn">
        Send Reset Link
    </button>
</div>

<script src="assets/js/forgot-password.js"></script>

</body>
</html>
