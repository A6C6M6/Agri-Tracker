<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agri Tracker | Settings</title>


<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    body{
        font-family:Arial,sans-serif;
        background:#f5f5f5;
    }

    .header{
        background:#2e7d32;
        color:white;
        padding:15px 20px;
        display:flex;
        justify-content:space-between;
        align-items:center;
    }

    .logout-btn{
        background:#d32f2f;
        color:white;
        border:none;
        padding:10px 15px;
        border-radius:5px;
        cursor:pointer;
    }

    .logout-btn:hover{
        background:#b71c1c;
    }

    .container{
        padding:20px;
    }

    .report-card{
        background:white;
        padding:20px;
        border-radius:10px;
        box-shadow:0 2px 8px rgba(0,0,0,0.1);
        margin-bottom:20px;
    }

    h2{
        margin-bottom:10px;
    }

    table{
        width:100%;
        border-collapse:collapse;
    }

    table th,
    table td{
        border:1px solid #ddd;
        padding:10px;
        text-align:left;
    }

    table th{
        background:#e8f5e9;
    }
</style>


</head>
<body>


<div class="header">
    <h1>Agri Tracker Settings</h1>

    <button
        class="logout-btn"
        onclick="window.location.href='logincard.html'">
        Logout
    </button>
</div>

<div class="container">

    <div class="report-card">
        <h2>Settings Dashboard</h2>
        <p>
            Welcome to the Settings Section.
            This page can display farm Settings,
            crop statistics, production summaries,
            and analytics.
        </p>
    </div>

    <div class="report-card">
        <h2>Sample Report</h2>

        <table>
            <thead>
                <tr>
                    <th>Crop</th>
                    <th>Area (Acres)</th>
                    <th>Production (Kg)</th>
                </tr>
            </thead>

            <tbody>
                <tr>
                    <td>Rice</td>
                    <td>12</td>
                    <td>4500</td>
                </tr>

                <tr>
                    <td>Banana</td>
                    <td>8</td>
                    <td>3200</td>
                </tr>

                <tr>
                    <td>Vegetables</td>
                    <td>5</td>
                    <td>1800</td>
                </tr>
            </tbody>
        </table>

    </div>

</div>


</body>
</html>
