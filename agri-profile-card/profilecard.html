<!-- Agri Profile Card Component -->
<div class="agri-profile-card-container">

    <div class="agri-profile-card">

        <!-- Header -->
        <div class="agri-profile-card-header">
            <h1 class="agri-profile-card-title">Agri Tracker</h1>
        </div>

        <!-- Profile Image -->
        <div class="agri-profile-card-avatar-wrapper">
            <!-- Dynamic User Image -->
            <img
                id="agriProfileCardAvatar"
                class="agri-profile-card-avatar"
                src="https://via.placeholder.com/200"
                alt="Profile Photo"
            >
        </div>

        <!-- User Details -->
        <div class="agri-profile-card-user-details">

            <!-- Dynamic User Name -->
            <h2 id="agriProfileCardUserName" class="agri-profile-card-name">
                Sarah Johnson
            </h2>

            <!-- Dynamic Email -->
            <p id="agriProfileCardEmail" class="agri-profile-card-email">
                sarah@example.com
            </p>

        </div>

        <!-- Actions -->
        <div class="agri-profile-card-actions">

            <button
                id="agriProfileCardManageBtn"
                type="button"
                class="agri-profile-card-manage-btn"
            >
                <span>Manage Your Account</span>
            </button>

            <button
                id="agriProfileCardSignOutBtn"
                type="button"
                class="agri-profile-card-signout-btn"
            >
                <span>Sign Out</span>
            </button>

        </div>

    </div>

</div>
