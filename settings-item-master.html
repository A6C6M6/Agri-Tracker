<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Item Master | Agri-Tracker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="assets/css/settings.css">
    <link rel="stylesheet" href="assets/css/settings-item-master.css">
</head>
<body>
    <div class="wrapper">
        <aside class="sidebar">
            <div class="logo">
                <i class="fa-solid fa-seedling"></i>
                <span>Agri-Tracker</span>
            </div>
            <ul class="menu">
                <li><a href="dashboard.html"><i class="fa-solid fa-house"></i><span>Dashboard</span></a></li>
                <li><a href="settings.html" class="active"><i class="fa-solid fa-gear"></i><span>Settings</span></a></li>
            </ul>
        </aside>

        <main class="main-content">
            <header>
                <div class="left">
                    <button id="toggleBtn" aria-label="Toggle sidebar"><i class="fa-solid fa-bars"></i></button>
                    <h2><i class="fa-solid fa-box"></i> Item Master</h2>
                </div>
                <div class="right">
                    <button class="logout-btn" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
                </div>
            </header>

            <div class="card-grid">
                <div class="setting-card">
                    <div class="tabs-nav" role="tablist">
                        <button type="button" class="tab-btn selected" id="tabBtnAdd" onclick="switchTab('add')"><i class="fa-solid fa-plus"></i> Add Item</button>
                        <button type="button" class="tab-btn" id="tabBtnEdit" onclick="switchTab('edit')"><i class="fa-solid fa-pen"></i> Edit Item</button>
                        <button type="button" class="tab-btn" id="tabBtnView" onclick="switchTab('view')"><i class="fa-solid fa-list"></i> View List</button>
                    </div>

                    <div class="tab-panel" id="panelAdd">
                        <form id="addItemForm" onsubmit="saveNewItem(event)">
                            <div class="form-group"><label>Item Name</label><input type="text" id="add_itemName" required></div>
                            <div class="form-group"><label>Category</label><input type="text" id="add_category"></div>
                            <div class="form-actions"><button type="submit" class="btn green-btn">Save Item</button></div>
                        </form>
                    </div>

                    <div class="tab-panel" id="panelEdit" style="display:none;">
                        <div class="form-group"><label>Select Item</label><select id="editItemSelect" onchange="loadItemForEdit(this.value)"></select></div>
                        <form id="editItemForm" onsubmit="updateExistingItem(event)" style="display:none;">
                            <input type="hidden" id="edit_itemId">
                            <div class="form-group"><label>Item Name</label><input type="text" id="edit_itemName" required></div>
                            <div class="form-actions"><button type="submit" class="btn green-btn">Update</button></div>
                        </form>
                        <p id="editEmptyHint">Select an item to edit.</p>
                    </div>

                    <div class="tab-panel" id="panelView" style="display:none;">
                        <table id="itemTable"><thead><tr><th>Item Name</th><th>Category</th></tr></thead><tbody id="itemTableBody"></tbody></table>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/js/supabase-config.js"></script>
    <script src="assets/js/settings-item-master.js"></script>
</body>
</html>
