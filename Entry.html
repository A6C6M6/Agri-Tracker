<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin User Profile</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#f5f7fa;
    padding:50px;
}

/* Header */

.header{
    background:#fff;
    padding:15px 30px;
    border-radius:12px;
    box-shadow:0 2px 10px rgba(0,0,0,.08);

    display:flex;
    justify-content:flex-end;
    align-items:center;
}

/* User Section */

.user{
    display:flex;
    align-items:center;
    gap:15px;
}

/* Notification */

.notification{
    position:relative;
    font-size:22px;
    color:#166534;
    cursor:pointer;
}

.notification-count{
    position:absolute;
    top:-8px;
    right:-8px;

    background:#16a34a;
    color:white;

    width:18px;
    height:18px;

    border-radius:50%;
    font-size:11px;

    display:flex;
    align-items:center;
    justify-content:center;
}

/* Avatar */

.avatar{
    width:55px;
    height:55px;

    border-radius:50%;
    background:#dff5e3;

    display:flex;
    align-items:center;
    justify-content:center;

    color:#1b7d36;
    font-size:28px;
}

/* User Info */

.user-info strong{
    color:#166534;
    font-size:18px;
}

.user-info span{
    color:#666;
    font-size:14px;
}

.dropdown{
    color:#166534;
    cursor:pointer;
    font-size:18px;
}

</style>
</head>

<body>

<div class="header">

    <div class="user">

        <!-- Notification -->

        <div class="notification">
            <i class="fa-regular fa-bell"></i>
            <span class="notification-count">3</span>
        </div>

        <!-- Avatar -->

        <div class="avatar">
            <i class="fas fa-user"></i>
        </div>

        <!-- User Info -->

        <div class="user-info">
            <strong>Admin User</strong><br>
            <span>Administrator</span>
        </div>

        <!-- Dropdown -->

        <div class="dropdown">
            <i class="fas fa-chevron-down"></i>
        </div>

    </div>

</div>

</body>
</html>
