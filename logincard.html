<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AgriTracker Login</title>

<link rel="stylesheet" href="./assets/css/logincard.css">
</head>

<body>

<div class="overlay">

    <div class="login-card">

        <h1>🌾 AgriTracker</h1>

        <p>Smart Agriculture Management System</p>

        <form id="loginForm">

            <input
                type="text"
                id="username"
                placeholder="Email / Mobile / Login ID"
                required
            >

            <input
                type="password"
                id="password"
                placeholder="Password / OTP"
                required
            >

            <button type="submit" class="login-btn">
                Login
            </button>

            <button type="button" class="register-btn" onclick="registerAccount()">
                Register New Account
            </button>

        </form>

    </div>

</div>

<script src="./assets/js/logincard.js"></script>

</body>
</html>
