<div class="agri-login-card-wrapper">

    <div class="agri-login-card">

        <div class="agri-login-card-header">
            <h1 class="agri-login-card-title">Agri Tracker</h1>
            <p class="agri-login-card-subtitle">
                Smart Agriculture Management System
            </p>
        </div>

        <form id="agriLoginCardForm" novalidate>

            <div class="agri-login-card-field">
                <label for="agriLoginId">
                    Email / Mobile / Login ID
                </label>

                <input
                    type="text"
                    id="agriLoginId"
                    class="agri-login-card-input"
                    placeholder="Enter Email / Mobile / Login ID"
                    required
                />

                <small
                    id="agriLoginIdError"
                    class="agri-login-card-error"
                ></small>
            </div>

            <div class="agri-login-card-field">

                <label for="agriPassword">
                    Password
                </label>

                <div class="agri-login-card-password-wrapper">

                    <input
                        type="password"
                        id="agriPassword"
                        class="agri-login-card-input"
                        placeholder="Enter Password"
                        required
                    />

                    <button
                        type="button"
                        class="agri-login-card-password-toggle"
                        id="agriPasswordToggle"
                        aria-label="Show Password"
                    >
                        ???
                    </button>

                </div>

                <small
                    id="agriPasswordError"
                    class="agri-login-card-error"
                ></small>

            </div>

            <div class="agri-login-card-forgot-wrap">

                <a
                    href="#"
                    id="agriForgotPasswordLink"
                    class="agri-login-card-forgot-link"
                >
                    Forgot Password?
                </a>

            </div>

            <div
                id="agriForgotPasswordMessage"
                class="agri-login-card-info-message"
            ></div>

            <button
                type="submit"
                class="agri-login-card-login-btn"
            >
                Login
            </button>

            <button
                type="button"
                id="agriRegisterButton"
                class="agri-login-card-register-btn"
            >
                Register New Account
            </button>

        </form>

    </div>

</div>
