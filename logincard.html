<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Agri Tracker</title>
    <link rel="stylesheet" href="assets/css/logincard.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="agri-login-card-wrapper">
        <div class="agri-login-card-container">
            <header class="agri-login-card-header">
                <div class="agri-login-card-logo">
                    <img src="assets/logo/agritracker_Login_emblem.png" alt="Agri Tracker Logo" onerror="this.style.display='none'; this.parentElement.classList.add('placeholder')">
                </div>
                <h1 class="agri-login-card-title">Agri Tracker</h1>
            </header>
            <form class="agri-login-card-form" id="agriLoginForm" novalidate>
                <div class="agri-login-card-field">
                    <label for="loginId">Login ID</label>
                    <input type="text" id="loginId" name="loginId" placeholder="Email" required>
                    <span class="agri-login-card-error" id="loginIdError"></span>
                </div>
                <div class="agri-login-card-field">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Password" required>
                </div>
                <button type="submit" class="agri-login-card-button" id="loginSubmitBtn">
                    <span class="btn-text">Login</span>
                </button>
            </form>
        </div>
    </div>
    <script src="assets/js/logincard.js"></script>
</body>
</html>
