<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Agri Tracker</title>


<link rel="stylesheet" href="assets/css/logincard.css">


</head>
<body>


<div class="agri-login-card-wrapper">
    <div class="agri-login-card-container">

        <header class="agri-login-card-header">
            <div class="agri-login-card-logo">
                <img
                    src="assets/logo/agritracker_Login_emblem.png"
                    alt="Agri Tracker Logo"
                    onerror="this.style.display='none'; this.parentElement.classList.add('placeholder')">
            </div>

            <h1 class="agri-login-card-title">Agri Tracker</h1>

            <p class="agri-login-card-subtitle">
                Smart Agriculture Management System
            </p>
        </header>

        <form id="agriLoginForm" novalidate>

            <div class="agri-login-card-field">
                <label for="loginId">Email</label>

                <input
                    type="email"
                    id="loginId"
                    name="loginId"
                    placeholder="Enter Email Address"
                    required>
            </div>

            <div class="agri-login-card-field">
                <label for="password">Password</label>

                <div class="agri-login-card-password-wrapper">

                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="Enter Password"
                        required>

                    <button
                        type="button"
                        id="passwordToggle"
                        class="agri-login-card-password-toggle">
                        Show
                    </button>

                </div>
            </div>

            <button
                type="submit"
                id="loginSubmitBtn"
                class="agri-login-card-button">

                <span class="btn-text">Login</span>
                <span class="btn-spinner"></span>

            </button>

        </form>

    </div>
</div>

<!-- Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- Supabase Config -->
<script src="assets/js/supabase-config.js"></script>

<!-- Login Script -->
<script src="assets/js/logincard.js"></script>


</body>
</html>
