<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Person Master</title>

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="stylesheet"
          href="assets/css/settings-person-master.css">

</head>

<body>

<div class="person-master-container">

    <!-- Header -->

    <div class="page-header">

        <div>

            <h2>
                <i class="fa-solid fa-users"></i>
                Person Master
            </h2>

            <p>
                Manage all persons from one place.
            </p>

        </div>

        <button
            class="btn btn-primary"
            id="btnAddPerson">

            <i class="fa-solid fa-plus"></i>

            Add Person

        </button>

    </div>


    <!-- Search -->

    <div class="toolbar">

        <div class="search-box">

            <i class="fa fa-search"></i>

            <input
                type="text"
                id="txtSearch"
                placeholder="Search Person...">

        </div>

    </div>


    <!-- Table -->

    <div class="table-wrapper">

        <table class="person-table">

            <thead>

            <tr>

                <th>#</th>

                <th>Code</th>

                <th>Name</th>

                <th>Mobile</th>

                <th>Email</th>

                <th>Status</th>

                <th width="170">
                    Action
                </th>

            </tr>

            </thead>

            <tbody id="personTableBody">

            </tbody>

        </table>

    </div>

</div>


<!-- ===========================
     ADD / EDIT MODAL
=========================== -->

<div
    class="modal"
    id="personModal">

    <div class="modal-content">

        <div class="modal-header">

            <h3 id="modalTitle">

                Add Person

            </h3>

            <button
                id="closeModal">

                ×

            </button>

        </div>

        <div class="modal-body">

            <input
                type="hidden"
                id="personId">

            <div class="form-group">

                <label>

                    Person Code

                </label>

                <input
                    id="personCode"
                    type="text">

            </div>

            <div class="form-group">

                <label>

                    Person Name

                </label>

                <input
                    id="personName"
                    type="text">

            </div>

            <div class="form-group">

                <label>

                    Mobile

                </label>

                <input
                    id="personMobile"
                    type="text">

            </div>

            <div class="form-group">

                <label>

                    Email

                </label>

                <input
                    id="personEmail"
                    type="email">

            </div>

            <div class="form-group">

                <label>

                    Address

                </label>

                <textarea
                    id="personAddress"></textarea>

            </div>

            <div class="form-group">

                <label>

                    Status

                </label>

                <select id="personStatus">

                    <option value="Active">

                        Active

                    </option>

                    <option value="Inactive">

                        Inactive

                    </option>

                </select>

            </div>

        </div>

        <div class="modal-footer">

            <button
                class="btn btn-secondary"
                id="btnCancel">

                Cancel

            </button>

            <button
                class="btn btn-success"
                id="btnSavePerson">

                Save

            </button>

        </div>

    </div>

</div>


<!-- Loading -->

<div
    id="loadingOverlay"
    class="loading-overlay">

    <div class="loader"></div>

    <p>

        Please Wait...

    </p>

</div>


<!-- Toast -->

<div
    id="toastContainer">

</div>


<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="assets/js/supabase-config.js"></script>

<script src="assets/js/settings-person-master.js"></script>

<script src="assets/js/settings-person-master-ui.js"></script>

</body>

</html>
