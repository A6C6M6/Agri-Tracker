<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Person Master | Agri-Tracker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="assets/css/settings.css">
    <link rel="stylesheet" href="assets/css/settings-person-master.css">
</head>
<body>
    <div class="wrapper">
        <aside class="sidebar">
            <div class="logo">
                <i class="fa-solid fa-seedling"></i>
                <span>Agri-Tracker</span>
            </div>
            <ul class="menu">
                <li><a href="dashboard.html"><i class="fa-solid fa-house"></i><span>Dashboard</span></a></li>
                <li><a href="settings.html" class="active"><i class="fa-solid fa-gear"></i><span>Settings</span></a></li>
            </ul>
        </aside>

        <main class="main-content">
            <header>
                <button id="toggleBtn"><i class="fa-solid fa-bars"></i></button>
                <h2><i class="fa-solid fa-users"></i> Person Master</h2>
                <button class="logout-btn" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
            </header>

            <div class="card-grid" style="padding: 20px;">
                <div class="setting-card">
                    <div class="card-top" style="justify-content: space-between; display: flex; align-items: center;">
                        <h3>Manage Persons</h3>
                        <button class="btn green-btn" onclick="openPersonModal()"><i class="fa-solid fa-plus"></i> Add Person</button>
                    </div>
                    <div class="table-container">
                        <table id="personTable">
                            <thead>
                                <tr>
                                    <th>Name</th><th>Mobile</th><th>Email</th><th>Type</th><th>Status</th><th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="personTableBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/js/supabase-config.js"></script>
    <script src="assets/js/settings-person-master.js"></script>
    <script src="assets/js/settings-person-master-ui.js"></script>
</body>
</html>
