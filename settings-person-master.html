<!-- settings-person-master.html -->
<!-- ഇടപ്പെടുത്തുക settings.html അല്ലെങ്കിൽ relevant page-ലുള്ള content area-ൽ -->
<div id="person-master-card" class="person-master-card">
  <div class="pm-header">
    <h3>Person Master</h3>
    <button id="pm-add-btn" class="btn btn-primary">Add Person</button>
  </div>

  <div id="pm-list" class="pm-list">
    <!-- person rows will be rendered here -->
    <div class="pm-loading">Loading...</div>
  </div>
</div>

<!-- Modal (hidden by default) -->
<div id="pm-modal" class="pm-modal hidden" aria-hidden="true">
  <div class="pm-modal-backdrop"></div>
  <div class="pm-modal-dialog" role="dialog" aria-modal="true">
    <form id="pm-form" class="pm-form" autocomplete="off">
      <h4 id="pm-modal-title">Add Person</h4>

      <input type="hidden" id="pm-id" />

      <label>Full Name <span class="required">*</span></label>
      <input id="pm-full_name" name="full_name" type="text" placeholder="Enter full name" required />

      <label>Mobile <span class="required">*</span></label>
      <input id="pm-mobile" name="mobile" type="tel" placeholder="Enter mobile" required />

      <label>Email</label>
      <input id="pm-email" name="email" type="email" placeholder="Enter email" />

      <label>Person Type</label>
      <input id="pm-person_type" name="person_type" type="text" placeholder="e.g., Farmer / Vendor" />

      <label>Status</label>
      <select id="pm-status" name="status">
        <option value="Active">Active</option>
        <option value="Inactive">Inactive</option>
      </select>

      <div class="pm-actions">
        <button type="button" id="pm-save-btn" class="btn btn-success">Save</button>
        <button type="button" id="pm-update-btn" class="btn btn-success hidden">Update</button>
        <button type="button" id="pm-cancel-btn" class="btn btn-secondary">Close</button>
      </div>

      <div id="pm-form-msg" class="pm-msg" aria-live="polite"></div>
    </form>
  </div>
</div>
