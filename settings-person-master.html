<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Person Master | Agri-Tracker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="assets/css/settings.css">
    <link rel="stylesheet" href="assets/css/settings-person-master.css">
</head>
<body>
    <div class="wrapper">
        <aside class="sidebar">
            <div class="logo">
                <i class="fa-solid fa-seedling"></i>
                <span>Agri-Tracker</span>
            </div>
            <ul class="menu">
                <li><a href="dashboard.html"><i class="fa-solid fa-house"></i><span>Dashboard</span></a></li>
                <li><a href="settings.html" class="active"><i class="fa-solid fa-gear"></i><span>Settings</span></a></li>
            </ul>
        </aside>

        <main class="main-content">
            <header>
                <div class="left">
                    <button id="toggleBtn"><i class="fa-solid fa-bars"></i></button>
                    <h2><i class="fa-solid fa-users"></i> Person Master</h2>
                </div>
                <div class="right">
                    <button class="logout-btn" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
                </div>
            </header>

            <div class="card-grid" style="padding: 20px;">
                <div class="setting-card">
                    <div class="card-top" style="justify-content: space-between; display: flex; align-items: center; margin-bottom: 20px;">
                        <h3>Manage Persons</h3>
                        <button class="btn green-btn" onclick="openPersonModal()"><i class="fa-solid fa-plus"></i> Add Person</button>
                    </div>
                    <div class="table-container">
                        <table id="personTable">
                            <thead>
                                <tr>
                                    <th>Name</th><th>Mobile</th><th>Email</th><th>Type</th><th>Status</th><th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="personTableBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="personModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Add Person</h2>
                <span class="close" onclick="closePersonModal()">&times;</span>
            </div>
            <form id="personForm" onsubmit="savePerson(event)">
                <input type="hidden" id="personId">
                <div class="form-group"><label>Full Name</label><input type="text" id="fullName" required></div>
                <div class="form-group"><label>Mobile</label><input type="text" id="mobile"></div>
                <div class="form-group"><label>Email</label><input type="email" id="email"></div>
                <div class="form-group"><label>Person Type</label><input type="text" id="personType"></div>
                <div class="form-group"><label>Status</label>
                    <select id="status"><option value="Active">Active</option><option value="Inactive">Inactive</option></select>
                </div>
                <div class="form-actions" style="display:flex; justify-content: flex-end; gap:10px; padding:0 25px 25px 25px;">
                    <button type="button" class="btn" onclick="closePersonModal()">Cancel</button>
                    <button type="submit" class="btn green-btn">Save</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/js/supabase-config.js"></script>
    <script src="assets/js/settings-person-master.js"></script>
    <script>
        // Sidebar Toggle Logic
        document.getElementById("toggleBtn").addEventListener("click", () => {
            document.querySelector(".sidebar").classList.toggle("collapsed");
        });
        
        // Logout Logic
        async function logout() {
            try {
                if (window.supabaseClient) await window.supabaseClient.auth.signOut();
            } catch(e) { console.error(e); }
            window.location.replace("logincard.html");
        }
    </script>
</body>
</html>
