<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Reset Password</title>

    <style>

        body{
            font-family:Arial,sans-serif;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            background:#f5f5f5;
        }

        .card{
            background:#fff;
            padding:30px;
            width:350px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,.1);
        }

        h2{
            margin-bottom:20px;
        }

        input{
            width:100%;
            padding:10px;
            margin-bottom:15px;
            box-sizing:border-box;
        }

        button{
            width:100%;
            padding:10px;
            cursor:pointer;
        }

    </style>

</head>

<body>

    <div class="card">

        <h2>Reset Password</h2>

        <input
            type="password"
            id="newPassword"
            placeholder="Enter New Password"
        >

        <button id="updateBtn">
            Update Password
        </button>

    </div>

    <!-- Supabase Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Reset Password JS -->
    <script src="assets/js/reset-password.js"></script>

</body>
</html>
